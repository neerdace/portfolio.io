<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EditVault | Pro Video Tutorials</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root {
            --bg: #0b0f1a;
            --card: #161b2a;
            --accent: #00d2ff;
            --text: #ffffff;
            --success: #00ffcc;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        nav { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: #111827; position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid #1e293b;
        }
        
        .logo { font-size: 1.5rem; font-weight: bold; color: white; text-decoration: none; }
        .logo span { color: var(--accent); }

        .container { padding: 30px 5%; max-width: 1400px; margin: 0 auto; }

        /* Progress Bar Section */
        .course-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; flex-wrap: wrap; gap: 20px;
        }

        .progress-container { width: 100%; max-width: 350px; }
        .progress-text { font-size: 0.85rem; margin-bottom: 8px; color: #94a3b8; font-weight: 600; }
        .progress-bg { width: 100%; height: 8px; background: #1e293b; border-radius: 10px; overflow: hidden; }
        .progress-fill { 
            height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--success)); 
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        /* Layout Controls */
        .view-controls button { 
            background: #1e293b; border: 1px solid #334155; color: #94a3b8; 
            padding: 8px 15px; border-radius: 6px; cursor: pointer; margin-left: 8px;
        }
        .view-controls button.active { background: var(--accent); color: #000; border-color: var(--accent); }

        /* Layout Wrapper */
        #tutorialWrapper.grid-view #tutorialDisplay { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; 
        }
        #tutorialWrapper.grid-view #videoPlayerSection { display: none; }

        /* Player Mode (Split Screen) */
        #tutorialWrapper.list-view-layout { display: flex; gap: 30px; height: 75vh; align-items: flex-start; }
        .list-view-layout #tutorialDisplay { flex: 1; overflow-y: auto; height: 100%; padding-right: 10px; }
        .list-view-layout #videoPlayerSection { flex: 2; height: 100%; position: sticky; top: 0; }

        /* Card Styling */
        .card { 
            background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer; 
            border: 1px solid #2d3748; transition: 0.3s; margin-bottom: 15px;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .card.active-play { border-color: var(--success); background: #1e293b; }
        .card img { width: 100%; height: 160px; object-fit: cover; }
        
        .list-view-layout .card { display: flex; height: 100px; }
        .list-view-layout .card img { width: 160px; height: 100%; }
        .card-content { padding: 12px; }
        .card-content h3 { margin: 0; font-size: 0.95rem; }

        /* Custom Player Wrapper */
        #videoPlayerSection { 
            background: #000; border-radius: 15px; overflow: hidden; 
            border: 1px solid #334155; position: relative; aspect-ratio: 16/9;
        }
        #player { width: 100%; height: 100%; border: none; }
        
        .player-placeholder { 
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; background: #0f172a; z-index: 10;
        }
        .play-icon { font-size: 4rem; color: var(--accent); cursor: pointer; transition: 0.3s; }
        .play-icon:hover { transform: scale(1.1); }

        #tutorialDisplay::-webkit-scrollbar { width: 6px; }
        #tutorialDisplay::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">EDIT<span>VAULT</span></a>
        <div class="view-controls">
            <button onclick="setView('grid')" id="gridBtn" class="active"><i class="fas fa-th"></i> Grid</button>
            <button onclick="setView('list')" id="listBtn"><i class="fas fa-list"></i> Player Mode</button>
        </div>
    </nav>

    <div class="container">
        <div class="course-header">
            <h2>Course: Professional Editing</h2>
            <div class="progress-container">
                <div class="progress-text">Lessons Completed: <span id="progressPercent">0%</span></div>
                <div class="progress-bg"><div id="progressBar" class="progress-fill"></div></div>
            </div>
        </div>

        <div id="tutorialWrapper" class="grid-view">
            <div id="tutorialDisplay"></div>

            <div id="videoPlayerSection">
                <div class="player-placeholder" id="placeholder">
                    <div class="play-icon" onclick="playVideo(0)"><i class="fas fa-play-circle"></i></div>
                    <p>Select a lesson to begin</p>
                </div>
                <div id="player"></div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // Tutorial Data: Replace videoId with yours
        const tutorials = [
            { title: "01. Basic Animations", img: "https://img.youtube.com/vi/u9bjCo9qoGU/maxresdefault.jpg", videoId: "u9bjCo9qoGU" },
            { title: "02. Color Grading Pro", img: "https://images.unsplash.com/photo-1492691523567-307502558381?w=400", videoId: "tgbNymZ7vqY" },
            { title: "03. Speed Ramping", img: "https://images.unsplash.com/photo-1536240478700-b869070f9279?w=400", videoId: "3X80FfC97S8" }
        ];

        let player;
        let currentVideoIndex = -1;
        let watched = new Set();

        // 1. Initialize Player with No Suggestions settings
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                playerVars: { 
                    'rel': 0, 
                    'modestbranding': 1, 
                    'iv_load_policy': 3,
                    'showinfo': 0
                },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        // 2. Handle Auto-Play Next logic
        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.ENDED) {
                playNext();
            }
        }

        function setView(view) {
            const wrapper = document.getElementById('tutorialWrapper');
            wrapper.className = (view === 'grid') ? 'grid-view' : 'list-view-layout';
            document.getElementById('gridBtn').className = (view === 'grid') ? 'active' : '';
            document.getElementById('listBtn').className = (view === 'list') ? 'active' : '';
            renderCards();
        }

        function playVideo(index) {
            currentVideoIndex = index;
            const data = tutorials[index];
            
            if(document.getElementById('tutorialWrapper').className === 'grid-view') {
                setView('list');
            }

            document.getElementById('placeholder').style.display = "none";
            
            // loadVideoById ensures fresh playback with current settings
            player.loadVideoById({
                videoId: data.videoId,
                suggestedQuality: 'hd1080'
            });
            
            watched.add(index);
            updateProgress();
            renderCards();
        }

        function playNext() {
            if (currentVideoIndex < tutorials.length - 1) {
                playVideo(currentVideoIndex + 1);
            }
        }

        function updateProgress() {
            const percent = Math.round((watched.size / tutorials.length) * 100);
            document.getElementById('progressBar').style.width = percent + "%";
            document.getElementById('progressPercent').innerText = percent + "%";
        }

        function renderCards() {
            const display = document.getElementById('tutorialDisplay');
            display.innerHTML = tutorials.map((t, i) => `
                <div class="card ${i === currentVideoIndex ? 'active-play' : ''}" onclick="playVideo(${i})">
                    <img src="${t.img}">
                    <div class="card-content">
                        <h3>${t.title}</h3>
                        <p style="font-size:0.7rem; color:${i === currentVideoIndex ? 'var(--success)' : '#64748b'}">
                            ${i === currentVideoIndex ? '• NOW PLAYING' : 'CLICK TO WATCH'}
                        </p>
                    </div>
                </div>
            `).join('');
        }

        window.onload = renderCards;
    </script>
</body>
</html>
